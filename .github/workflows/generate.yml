name: Daily Generation

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allow manual triggering from the GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run generation engine
        run: |
          python3 engine/generate.py --count 20

      - name: Verify provenance correctness
        run: |
          # This step will fail the workflow if provenance verification fails
          python3 engine/verify_provenance.py

      - name: Build index and sync site data
        run: |
          python3 engine/build_index.py

      - name: Commit new generation and data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ site/data/
          git commit -m "chore: daily generation and provenance verification" || echo "No changes to commit"
          git push

  deploy-pages:
    needs: generate-and-verify
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
