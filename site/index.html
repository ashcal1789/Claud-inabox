<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glass-Box Language Machine</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <nav>
      <a href="index.html" class="active">Today</a>
      <a href="archive.html">Archive</a>
      <a href="about.html">About</a>
    </nav>
  </header>

  <main>
    <div id="run-meta" class="run-meta"></div>
    <ol id="sentence-list" class="sentence-list"></ol>
    <div id="loading" class="loading">Loading generation…</div>
    <div id="error" class="error" hidden></div>
  </main>

  <!-- Provenance panel (hidden until a sentence is clicked) -->
  <aside id="provenance-panel" class="provenance-panel" hidden>
    <button id="panel-close" class="panel-close" aria-label="Close">×</button>
    <h2 class="panel-title">Provenance</h2>
    <p id="panel-sentence" class="panel-sentence"></p>
    <div id="panel-fragments" class="panel-fragments"></div>
  </aside>

  <script src="js/main.js"></script>
</body>
</html>
